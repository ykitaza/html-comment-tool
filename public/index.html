<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html-comment — review</title>
    <link rel="stylesheet" href="/overlay.css" />
  </head>
  <body>
    <div id="app">
      <!-- Left: the rendered target inside an iframe -->
      <main id="stage">
        <div id="toolbar">
          <span id="file-label">…</span>
          <!-- View toggle: preview (rendered) vs source (raw text) -->
          <div id="view-toggle" class="seg" hidden>
            <button id="view-preview" class="seg-btn" title="プレビュー表示">👁 プレビュー</button>
            <button id="view-source" class="seg-btn" title="ソース表示">&lt;&gt; ソース</button>
          </div>
          <span class="spacer"></span>
          <!-- Selection sub-modes — only meaningful in HTML preview -->
          <button id="mode-element" class="mode-btn active" title="クリックで要素を選択">
            ⬚ 要素を選択
          </button>
          <button id="mode-text" class="mode-btn" title="テキストをドラッグで選択">
            ✎ テキスト選択
          </button>
          <button id="mode-off" class="mode-btn" title="選択を無効化してページを普通に操作">
            ✋ 操作モード
          </button>
          <button id="open-settings" class="icon-btn" title="設定（プロンプトテンプレート）">⚙</button>
          <button id="toggle-panel" class="icon-btn" title="コメントパネルを開閉">⟩</button>
        </div>
        <!-- Adapter (render or source) builds the contents at runtime -->
        <div id="frame-wrap"></div>
      </main>

      <!-- Drag handle to resize the comment panel -->
      <div id="resizer" title="ドラッグで幅を調整"></div>

      <!-- Right: comment panel -->
      <aside id="panel">
        <header>
          <h1>コメント</h1>
          <span id="count" class="badge">0</span>
          <span class="spacer"></span>
          <button id="collapse-panel" class="icon-btn" title="パネルを隠す">⟩</button>
        </header>

        <div id="hint" class="hint">
          左の<strong>要素／行をクリック</strong>するか<strong>範囲を選択（ドラッグ）</strong>すると、ここにコメントを追加できます。
        </div>

        <ul id="comments"></ul>

        <footer>
          <button id="copy" class="primary" disabled>📋 AIプロンプトをコピー</button>
          <button id="clear" class="ghost" disabled>すべて削除</button>
          <div id="copied-toast" class="toast">コピーしました</div>
        </footer>
      </aside>
    </div>

    <!-- Floating button to reopen the panel when collapsed -->
    <button id="show-panel" class="show-panel hidden" title="コメントパネルを表示">⟨ コメント</button>

    <!-- Settings drawer: prompt template selection / custom editing -->
    <div id="settings" class="drawer hidden">
      <div class="drawer-head">
        <h2>設定 — プロンプトテンプレート</h2>
        <button id="settings-close" class="icon-btn" title="閉じる">✕</button>
      </div>
      <div class="drawer-body">
        <label class="field-label">テンプレート</label>
        <select id="template-select"></select>

        <p class="field-help">
          AIに渡すプロンプトの口調・目的を選びます。下のテキストはそのまま編集でき、
          編集すると「カスタム」として保存されます。
        </p>

        <label class="field-label">本文テンプレート</label>
        <textarea id="template-body" rows="10" spellcheck="false"></textarea>

        <div class="field-vars">
          使える差し込み変数:
          <code>{{file}}</code> <code>{{comments}}</code> <code>{{count}}</code>
          <br>
          <code>{{comments}}</code> は各コメント（位置情報＋指摘）の一覧に置き換わります。
        </div>

        <div class="drawer-actions">
          <button id="template-reset" class="ghost">このプリセットに戻す</button>
          <button id="template-save" class="primary">保存</button>
        </div>

        <div class="drawer-preview-wrap">
          <label class="field-label">プレビュー（現在のコメントで生成）</label>
          <pre id="template-preview" class="drawer-preview"></pre>
        </div>
      </div>
    </div>
    <div id="settings-backdrop" class="backdrop hidden"></div>

    <!-- New-comment popover -->
    <div id="composer" class="composer hidden">
      <div class="composer-target" id="composer-target"></div>
      <textarea id="composer-input" rows="3" placeholder="この箇所への指摘・修正指示を書く…"></textarea>
      <div class="composer-actions">
        <button id="composer-cancel" class="ghost">キャンセル</button>
        <button id="composer-save" class="primary">追加 (⌘/Ctrl+Enter)</button>
      </div>
    </div>

    <script type="module" src="/boot.js"></script>
  </body>
</html>
